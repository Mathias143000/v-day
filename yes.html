<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffe4ec">
    <meta name="description" content="Праздничный финал интерактивной валентинки.">

<body>

    <div class="container yes-container">
        <h1 class="yes-title">Я знал, что ты скажешь да! 🎉</h1>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" type="button" onclick="toggleMusic()" title="Включить или выключить музыку" aria-label="Выключить музыку">🔊</button>

    <script src="yes-script.js"></script>
